
security:
  argon2:
    type: ARGON2d      # ARGON2i, ARGON2d 或 ARGON2id
    iterations: 2        # 迭代次数
    memory: 65536        # 内存使用量(KB)
    parallelism: 4       # 并行度



# XXL-JOB 配置
