  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin  # 调度中心地址
    executor:
      appname: hrcs-salary-executor
      port: 9999
      logpath: /data/logs/xxl-job/hrcs-salary
      logretentiondays: 30
    accessToken: default_token

